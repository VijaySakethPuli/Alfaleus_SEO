<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Alfaleus CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="login-page">

    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <h1 class="login-title">Alfaleus CMS</h1>
            <p class="login-subtitle">Sign in to your content workspace</p>
        </div>

        <!-- Alerts -->
        <div th:if="${param.error}" class="alert alert-danger">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Invalid email or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M5 13l4 4L19 7"/>
            </svg>
            You've been signed out successfully.
        </div>

        <!-- Form -->
        <form th:action="@{/admin/login}" method="post">
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <label class="form-label">Email Address</label>
                <input id="email" type="email" name="email" class="form-control"
                       placeholder="admin@alfaleus.com" required autofocus>
            </div>

            <div class="form-group" style="margin-bottom: 1.75rem;">
                <label class="form-label">Password</label>
                <input id="password" type="password" name="password" class="form-control"
                       placeholder="••••••••" required>
            </div>

            <button id="login-btn" type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.9rem; font-size: 1rem;">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                </svg>
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted);">
            Default credentials: admin@alfaleus.com / password
        </p>
    </div>

</body>
</html>
